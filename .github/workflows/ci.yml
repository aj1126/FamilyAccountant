name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-shared:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @family-accountant/shared build

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @family-accountant/backend build

  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fa_user
          POSTGRES_PASSWORD: fa_pass
          POSTGRES_DB: family_accountant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://fa_user:fa_pass@localhost:5432/family_accountant_test
      JWT_SECRET: test_jwt_secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: test_refresh_secret
      JWT_REFRESH_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @family-accountant/backend test
